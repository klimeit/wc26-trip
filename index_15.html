<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ЧМ-2026 · Поездка</title>
<style>
  :root {
    --bg: #FAFAF7;
    --surface: #FFFFFF;
    --surface-alt: #F4F1EC;
    --text: #0B2545;
    --muted: #6B7280;
    --accent: #13759E;
    --gold: #C99A2E;
    --danger: #B91C1C;
    --success: #047857;
    --border: #E5E7EB;
    --hot-bg: #FEF2F2;
    --hot-border: #FECACA;
    --warn-bg: #FEF3C7;
    --warn-text: #92400E;
    --done-bg: #ECFDF5;
    --info-bg: #EFF6FF;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0F1419;
      --surface: #1A2027;
      --surface-alt: #232B36;
      --text: #E5E7EB;
      --muted: #9CA3AF;
      --accent: #60A5FA;
      --gold: #FBBF24;
      --danger: #F87171;
      --success: #34D399;
      --border: #2D3640;
      --hot-bg: #450A0A;
      --hot-border: #7F1D1D;
      --warn-bg: #422006;
      --warn-text: #FCD34D;
      --done-bg: #064E3B;
      --info-bg: #172554;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 80px;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 12px 14px 20px; }

  header {
    background: var(--surface);
    border-radius: 14px;
    padding: 14px 16px 12px;
    border: 1px solid var(--border);
    margin-bottom: 12px;
  }
  h1 { font-size: 19px; margin: 0 0 2px; font-weight: 700; letter-spacing: -0.01em; }
  .sub { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .progress { height: 6px; background: var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 4px; }
  .bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); transition: width 0.4s ease; width: 0; }
  .progress-label { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; }

  .tabs {
    position: sticky; top: 0; z-index: 50; display: flex; background: var(--bg);
    padding: 8px 0; margin: 0 -14px 12px; padding-left: 14px; padding-right: 14px;
    overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; border-bottom: 1px solid var(--border);
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto; padding: 8px 14px; font-size: 13px; font-weight: 500; color: var(--muted);
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; cursor: pointer;
    margin-right: 6px; white-space: nowrap; font-family: inherit; transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
  .tab .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--danger); display: none; }
  .tab.has-hot .dot { display: inline-block; }
  .tab.active .dot { background: white; }

  .panel { display: none; }
  .panel.active { display: block; }

  .actions { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .btn { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 11px; cursor: pointer; font-family: inherit; font-weight: 500; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.danger:hover { border-color: var(--danger); color: var(--danger); }

  .section { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
  .section.hot { border-color: var(--hot-border); }
  .section.done { opacity: 0.65; }
  .sec-head { padding: 12px 14px; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 10px; }
  .sec-head:hover { background: var(--bg); }
  .sec-icon { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .section.hot .sec-icon { background: var(--danger); }
  .section.done .sec-icon { background: var(--success); }
  .sec-title { flex: 1; font-size: 14px; font-weight: 600; }
  .sec-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .sec-count { background: var(--bg); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-variant-numeric: tabular-nums; margin-right: 6px; }
  .section.done .sec-count { background: var(--done-bg); color: var(--success); }
  .chevron { width: 14px; height: 14px; transition: transform 0.2s; color: var(--muted); flex-shrink: 0; }
  .section.collapsed .chevron { transform: rotate(-90deg); }
  .section.collapsed .sec-body { display: none; }
  .sec-body { padding: 0 14px 8px; border-top: 1px solid var(--border); padding-top: 4px; }

  .item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 4px; border-bottom: 1px solid var(--border); }
  .item:last-child { border-bottom: none; }
  .item.checked { opacity: 0.55; }
  .item.checked .item-text { text-decoration: line-through; }
  .check { flex-shrink: 0; width: 20px; height: 20px; border: 1.5px solid var(--border); border-radius: 5px; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: transparent; }
  .check:hover { border-color: var(--accent); }
  .item.checked .check { background: var(--success); border-color: var(--success); }
  .check svg { width: 12px; height: 12px; stroke: white; stroke-width: 3; fill: none; opacity: 0; }
  .item.checked .check svg { opacity: 1; }
  .item-content { flex: 1; min-width: 0; }
  .item-text { font-size: 13px; line-height: 1.4; }
  .item-note { font-size: 11.5px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  .item-note a { color: var(--accent); text-decoration: none; }
  .item-note a:hover { text-decoration: underline; }
  .badge { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 4px; margin-left: 4px; font-weight: 700; letter-spacing: 0.04em; vertical-align: 1px; }
  .badge.hot { background: var(--hot-bg); color: var(--danger); }
  .badge.warn { background: var(--warn-bg); color: var(--warn-text); }

  .timeline { position: relative; padding-left: 20px; }
  .timeline::before { content: ''; position: absolute; left: 6px; top: 8px; bottom: 8px; width: 2px; background: var(--border); }
  .tl-item { position: relative; margin-bottom: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
  .tl-item::before { content: ''; position: absolute; left: -20px; top: 16px; width: 12px; height: 12px; border-radius: 50%; background: var(--surface); border: 2px solid var(--accent); }
  .tl-item.hot::before { border-color: var(--danger); }
  .tl-item.flight::before { border-color: var(--gold); background: var(--gold); }
  .tl-item.tbd::before { border-color: var(--muted); border-style: dashed; }
  .tl-day { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; margin-bottom: 4px; }
  .tl-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .tl-time { font-size: 12px; color: var(--accent); font-weight: 500; font-variant-numeric: tabular-nums; margin-bottom: 6px; }
  .tl-desc { font-size: 12.5px; color: var(--muted); line-height: 1.65; }
  .tl-desc a { color: var(--accent); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; font-weight: 500; cursor: pointer; display: inline-block; padding: 2px 1px; min-height: 24px; line-height: 1.4; position: relative; z-index: 2; }
  .tl-desc a:active { opacity: 0.6; }
  .tl-desc b { color: var(--text); font-weight: 600; }
  .tl-meta { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; }
  .meta-chip { font-size: 10px; padding: 3px 8px; background: var(--bg); border-radius: 6px; color: var(--muted); font-weight: 500; }
  .meta-chip.code { font-family: ui-monospace, "SF Mono", Menlo, monospace; color: var(--accent); }
  .meta-chip.warn { background: var(--warn-bg); color: var(--warn-text); }

  .contact-group { margin-bottom: 16px; }
  .group-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; margin: 0 0 8px 4px; }
  .contact-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; gap: 10px; text-decoration: none; color: var(--text); transition: all 0.15s; }
  .contact-card:hover { border-color: var(--accent); }
  .contact-card.hot { border-color: var(--hot-border); background: var(--hot-bg); }
  .contact-card.hot:hover { border-color: var(--danger); }
  .c-info { flex: 1; min-width: 0; }
  .c-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .c-detail { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .c-action { font-size: 11px; padding: 5px 10px; background: var(--accent); color: white; border-radius: 6px; font-weight: 500; flex-shrink: 0; }
  .contact-card.hot .c-action { background: var(--danger); }

  .doc-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .doc-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .doc-name { font-size: 14px; font-weight: 700; }
  .doc-tag { font-size: 10px; padding: 3px 8px; background: var(--info-bg); color: var(--accent); border-radius: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .doc-tag.warn { background: var(--warn-bg); color: var(--warn-text); }
  .doc-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 12px; gap: 12px; }
  .doc-row .k { color: var(--muted); flex-shrink: 0; }
  .doc-row .v { text-align: right; font-weight: 500; font-variant-numeric: tabular-nums; word-break: break-all; }
  .doc-row .v.mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .doc-row.warn .v { color: var(--warn-text); }
  .doc-row.danger .v { color: var(--danger); }
  .doc-row.success .v { color: var(--success); }

  .budget-hero { background: linear-gradient(135deg, var(--surface), var(--surface-alt)); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .budget-hero-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; font-weight: 600; }
  .budget-hero-amount { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); font-variant-numeric: tabular-nums; }
  .budget-hero-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .budget-hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .budget-stat { background: var(--bg); border-radius: 10px; padding: 10px 12px; }
  .budget-stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
  .budget-stat-value { font-size: 18px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; margin-top: 2px; }
  .budget-stat-value.accent { color: var(--accent); }
  .budget-stat-value.success { color: var(--success); }
  .budget-stat-value.danger { color: var(--danger); }
  .budget-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .budget-card-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .budget-card-total { font-variant-numeric: tabular-nums; color: var(--accent); }
  .budget-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; gap: 12px; }
  .budget-row:last-child { border-bottom: none; }
  .budget-row .label { color: var(--text); flex: 1; }
  .budget-row .label-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .budget-row .value { font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text); text-align: right; white-space: nowrap; }
  .budget-row .value-sub { font-size: 11px; color: var(--muted); font-weight: 400; margin-top: 2px; }
  .budget-row.subtotal { border-top: 2px solid var(--border); border-bottom: none; padding-top: 10px; margin-top: 4px; }
  .budget-row.subtotal .label { font-weight: 700; }
  .budget-row.subtotal .value { color: var(--accent); }
  .progress-bar { height: 6px; background: var(--border); border-radius: 6px; overflow: hidden; margin: 6px 0 0; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.4s; }
  .progress-fill.warn { background: var(--gold); }
  .progress-fill.danger { background: var(--danger); }
  .budget-note { background: var(--bg); border-left: 3px solid var(--gold); padding: 10px 12px; border-radius: 6px; font-size: 12px; color: var(--text); line-height: 1.5; margin-top: 10px; }
  .budget-note.danger { border-left-color: var(--danger); }
  .budget-note.success { border-left-color: var(--success); }
  .budget-note b { color: var(--text); }

  footer { text-align: center; font-size: 11px; color: var(--muted); padding: 14px 0 0; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>ЧМ-2026 · 13–27 июля</h1>
    <div class="sub">Чеботок Георгий · Москва → Атланта → Майами → Нью-Йорк → Вашингтон</div>

      <span id="progress-text">0 из 0</span>
      <span id="percent">0%</span>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="plan">📍 План</button>
    <button class="tab has-hot" data-tab="checklist">✓ Чек-лист<span class="dot"></span></button>
    <button class="tab" data-tab="budget">💰 Бюджет</button>
    <button class="tab" data-tab="contacts">📞 Контакты</button>
    <button class="tab" data-tab="docs">🛂 Документы</button>
  </div>

  <div class="panel active" id="panel-plan">
    <div class="timeline" id="timeline"></div>
  </div>

  <div class="panel" id="panel-checklist">
    <div class="actions">
      <button class="btn" onclick="toggleAll(true)">Свернуть все</button>
      <button class="btn" onclick="toggleAll(false)">Развернуть все</button>
      <button class="btn" onclick="jumpToCurrent()">К текущему</button>
      <button class="btn danger" onclick="resetAll()">Сбросить</button>
    </div>
    <div id="sections"></div>
  </div>

  <div class="panel" id="panel-budget">
    <div id="budget"></div>
  </div>

  <div class="panel" id="panel-contacts">
    <div id="contacts"></div>
  </div>

  <div class="panel" id="panel-docs">
    <div id="docs"></div>
  </div>

  <footer>Состояние чек-листа сохраняется в этом браузере. Маршрут: сценарий A подтверждён.</footer>
</div>

function renderChecklist() {
  const container = document.getElementById('sections');
  container.innerHTML = SECTIONS.map(sec => {
    const total = sec.items.length;
    const done = sec.items.filter(i => state[`${sec.id}.${i.id}`]).length;
    const isFullyDone = done === total;
    const items = sec.items.map(item => {
      const checked = !!state[`${sec.id}.${item.id}`];
      const badgeHtml = item.badge ? `<span class="badge ${item.badge}">${item.badge === 'hot' ? '!' : '⚠'}</span>` : '';
      return `
        <div class="item ${checked ? 'checked' : ''}">
          <div class="check" onclick="toggleItem('${sec.id}', '${item.id}')">${checkSvg}</div>
          <div class="item-content">
            <div class="item-text">${item.text}${badgeHtml}</div>
            ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
    const collapsedClass = isFullyDone ? 'collapsed' : '';
    const stateClass = isFullyDone ? 'done' : (sec.hot ? 'hot' : '');
    return `
      <div class="section ${stateClass} ${collapsedClass}" id="sec-${sec.id}">
        <div class="sec-head" onclick="this.parentElement.classList.toggle('collapsed')">
          <div class="sec-icon"></div>
          <div style="flex:1; min-width:0">
            <div class="sec-title">${sec.title}</div>
            <div class="sec-time">${sec.time}</div>
          </div>
          <div class="sec-count">${done}/${total}</div>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="sec-body">${items}</div>
      </div>
    `;
  }).join('');
  patchLinks(container);
}

function renderTimeline() {
  const container = document.getElementById('timeline');
  container.innerHTML = TIMELINE.map(it => {
    const cls = it.flight ? 'flight' : (it.tbd ? 'tbd' : (it.hot ? 'hot' : ''));
    const meta = it.meta ? `<div class="tl-meta">${it.meta.map(m => `<span class="meta-chip ${/₽|\$/.test(m) ? 'code' : ''} ${/не куплен|TBD|не проверен/i.test(m) ? 'warn' : ''}">${m}</span>`).join('')}</div>` : '';
    return `
      <div class="tl-item ${cls}">
        <div class="tl-day">${it.day}</div>
        <div class="tl-title">${it.title}</div>
        <div class="tl-time">${it.time}</div>
        <div class="tl-desc">${it.desc}</div>
        ${meta}
      </div>
    `;
  }).join('');
  patchLinks(container);
}

function patchLinks(root) {
  if (!root) return;
  const links = root.querySelectorAll('a[href]');
  links.forEach(a => {
    const href = a.getAttribute('href');
    if (!href) return;
    const isHttp = /^https?:\/\//i.test(href);
    if (isHttp) { a.setAttribute('target', '_blank'); a.setAttribute('rel', 'noopener noreferrer'); }
  });
}

function renderContacts() {
  const container = document.getElementById('contacts');
  container.innerHTML = CONTACTS.map(group => {
    const items = group.list.map(c => {
      const isLink = !!c.href;
      const tag = isLink ? 'a' : 'div';
      const hrefAttr = isLink ? `href="${c.href}"` : '';
      const action = isLink ? `<span class="c-action">${c.href.startsWith('tel:') ? 'Позвонить' : 'Открыть'}</span>` : '';
      return `
        <${tag} ${hrefAttr} class="contact-card">
          <div class="c-info">
            <div class="c-name">${c.name}</div>
            <div class="c-detail">${c.detail}</div>
          </div>
          ${action}
        </${tag}>
      `;
    }).join('');
    return `<div class="contact-group"><div class="group-title">${group.title}</div>${items}</div>`;
  }).join('');
  patchLinks(container);
}

function renderDocs() {
  const container = document.getElementById('docs');
  container.innerHTML = DOCS.map(doc => {
    const rows = doc.rows.map(r => {
      const cls = r.warn ? 'warn' : r.danger ? 'danger' : r.success ? 'success' : '';
      const monoCls = r.mono ? 'mono' : '';
      return `<div class="doc-row ${cls}"><div class="k">${r.k}</div><div class="v ${monoCls}">${r.v}</div></div>`;
    }).join('');
    const tagCls = /не куплено|не оплачено/i.test(doc.tag) ? 'warn' : '';
    return `
      <div class="doc-card">
        <div class="doc-head">
          <div class="doc-name">${doc.name}</div>
          <span class="doc-tag ${tagCls}">${doc.tag}</span>
        </div>
        ${rows}
      </div>
    `;
  }).join('');
}

function renderBudget() {
  const container = document.getElementById('budget');
  const rate = BUDGET.rate;

  const allItems = [
    ...BUDGET.flights.map(x => ({ ...x, cat: 'Перелёт' })),
    ...BUDGET.tickets.map(x => ({ ...x, cat: 'Билет' })),
    ...BUDGET.accommodation.map(x => ({ ...x, rub: Math.round(x.usd * rate), cat: 'Проживание' })),
    ...BUDGET.other.map(x => ({ ...x, rub: Math.round(x.usd * rate), status: x.status || 'план', cat: 'Прочее' })),
  ];

  const totalBudgetRub = BUDGET.limitRub;
  const spentRub = allItems.filter(x => x.status === 'оплачено').reduce((s, x) => s + x.rub, 0);
  const remainingRub = totalBudgetRub - spentRub;
  const upcomingRub = allItems.filter(x => x.status !== 'оплачено').reduce((s, x) => s + x.rub, 0);
  const bufferRub = remainingRub - upcomingRub;

  const toUsd = r => Math.round(r / rate);

  container.innerHTML = `
    <div class="budget-hero">
      <div class="budget-hero-title">Бюджет поездки</div>
      <div class="budget-hero-row" style="margin-top:4px">
        <div class="budget-stat"><div class="budget-stat-label">Общий бюджет</div><div class="budget-stat-value">${totalBudgetRub.toLocaleString('en-US')} ₽</div><div class="value-sub">~$${toUsd(totalBudgetRub)}</div></div>
        <div class="budget-stat"><div class="budget-stat-label">Потрачено</div><div class="budget-stat-value danger">${spentRub.toLocaleString('en-US')} ₽</div><div class="value-sub">~$${toUsd(spentRub)}</div></div>
        <div class="budget-stat"><div class="budget-stat-label">Остаток</div><div class="budget-stat-value success">${remainingRub.toLocaleString('en-US')} ₽</div><div class="value-sub">~$${toUsd(remainingRub)}</div></div>
        <div class="budget-stat"><div class="budget-stat-label">Запас после всех трат</div><div class="budget-stat-value ${bufferRub < 0 ? 'danger' : 'accent'}">${bufferRub.toLocaleString('en-US')} ₽</div><div class="value-sub">~$${toUsd(bufferRub)}</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill ${spentRub/totalBudgetRub > 0.85 ? 'warn' : ''}" style="width:${Math.min(100, Math.round(spentRub/totalBudgetRub*100))}%"></div></div>
    </div>

    <div class="budget-card">
      <div class="budget-card-title"><span>💳 Распределение по счетам</span></div>
      ${BUDGET.resources.map(r => `<div class="budget-row"><div><div class="label">${r.name}</div><div class="label-sub">${r.note}</div></div>${r.usd ? `<div class="value">$${r.usd.toLocaleString('en-US')}</div>` : ''}</div>`).join('')}
      <div class="budget-note">Итого на руках: $4 000. Остаток по детальному учёту ~$3 600 — расхождение в пределах округлений конвертации валют, некритично.</div>
    </div>

    <div class="budget-card">
      <div class="budget-card-title"><span>✈️ Перелёты</span><span class="budget-card-total">${BUDGET.flights.reduce((s,f)=>s+f.rub,0).toLocaleString('en-US')} ₽</span></div>
      ${BUDGET.flights.map(f => `<div class="budget-row"><div><div class="label">${f.name}</div><div class="label-sub">${f.status}</div></div><div class="value">${f.rub.toLocaleString('en-US')} ₽<div class="value-sub">~$${toUsd(f.rub)}</div></div></div>`).join('')}
    </div>

    <div class="budget-card">
      <div class="budget-card-title"><span>🎟️ Билеты на матчи</span><span class="budget-card-total">${BUDGET.tickets.reduce((s,t)=>s+t.rub,0).toLocaleString('en-US')} ₽</span></div>
      ${BUDGET.tickets.map(t => `<div class="budget-row"><div><div class="label">${t.name}</div><div class="label-sub">${t.status}</div></div><div class="value">${t.rub.toLocaleString('en-US')} ₽<div class="value-sub">~$${toUsd(t.rub)}</div></div></div>`).join('')}
      <div class="budget-note">Билет за 3-е место (Майами) — подарок, не входит в расчёт.</div>
    </div>

    <div class="budget-card">
      <div class="budget-card-title"><span>🏨 Проживание</span><span class="budget-card-total">$${BUDGET.accommodation.reduce((s,a)=>s+a.usd,0)}</span></div>
      ${BUDGET.accommodation.map(a => `<div class="budget-row"><div><div class="label">${a.name}</div><div class="label-sub">${a.status}</div></div><div class="value">$${a.usd}<div class="value-sub">~${a.usd*rate|0} ₽</div></div></div>`).join('')}
    </div>

    <div class="budget-card">
      <div class="budget-card-title"><span>🎯 Транспорт, еда, активности</span><span class="budget-card-total">$${BUDGET.other.reduce((s,o)=>s+o.usd,0)}</span></div>
      ${BUDGET.other.map(o => `<div class="budget-row"><div class="label">${o.name}</div><div class="value">$${o.usd}<div class="value-sub">~${o.usd*rate|0} ₽</div></div></div>`).join('')}
    </div>
  `;
  patchLinks(container);
}

let state = {};
function loadState() {
  try { const raw = localStorage.getItem('wc26-checklist-state'); if (raw) state = JSON.parse(raw); }
  catch (e) { state = {}; }
}
function saveState() {
  try { localStorage.setItem('wc26-checklist-state', JSON.stringify(state)); } catch (e) {}
}
function toggleItem(secId, itemId) {
  const key = `${secId}.${itemId}`;
  state[key] = !state[key];
  saveState();
  renderChecklist();
  updateProgress();
}
function resetAll() {
  if (!confirm('Сбросить все отметки?')) return;
  state = {};
  saveState();
  renderChecklist();
  updateProgress();
}
function toggleAll(collapse) {
  document.querySelectorAll('#sections .section').forEach(s => { if (collapse) s.classList.add('collapsed'); else s.classList.remove('collapsed'); });
}
function jumpToCurrent() {
  for (const sec of SECTIONS) {
    const total = sec.items.length;
    const done = sec.items.filter(i => state[`${sec.id}.${i.id}`]).length;
    if (done < total) {
      const el = document.getElementById(`sec-${sec.id}`);
      if (el) { el.classList.remove('collapsed'); el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
      break;
    }
  }
}
function updateProgress() {
  let total = 0, done = 0, hasHot = false;
  for (const sec of SECTIONS) {
    total += sec.items.length;
    done += sec.items.filter(i => state[`${sec.id}.${i.id}`]).length;
    if (sec.hot && !sec.items.every(i => state[`${sec.id}.${i.id}`])) hasHot = true;
  }
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done} из ${total}`;
  document.getElementById('percent').textContent = pct + '%';
  const tabChecklist = document.querySelector('[data-tab="checklist"]');
  if (hasHot) tabChecklist.classList.add('has-hot'); else tabChecklist.classList.remove('has-hot');
}
function setupTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

loadState();
renderChecklist();
renderTimeline();
renderContacts();
renderDocs();
renderBudget();
updateProgress();
setupTabs();
